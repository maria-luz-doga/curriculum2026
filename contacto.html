<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La web de Doga</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
    <header>
        <nav>
            <a href="index.html">
                <img src="img/svg/estrella.svg" alt="logo" width="40" height="39" />
            </a>

            <ul id="botones">
                <li>
                    <a href="sobremi.html">SOBRE MI</a>
                </li>
                <li>
                    <a href="porfolio.html">PORFOLIO</a>
                </li>
                <li>
                    <a href="contacto.html">CONTACTO</a>
                </li>
            </ul>
        </nav>
    </header>

    <main id="main-cont">
        <section class="cont-full">
            <h1 class="h1-trabajar">¡TRABAJEMOS JUNTOS!</h1>

            <form method="post" action target="_blank" enctype="multipart/form-data" class="formulario">
                <div class="dato">
                    <div class="datos-personas">
                        <label for="nobre">
                            <p>Nombre y Apellido*</p>
                        </label>
                        <input type="text" name="nombre" id="nombre" maxlength="30" required>
                    </div>
                    <div class="mail">
                        <label for="mail">
                            <p>Tu mail*</p>
                        </label>
                        <input type="email" name="mail" id="email" required>
                    </div>
                </div>

                <div class="buscas">
                    <p>Buscas</p>
                    <div class="selecciona">
                        <label class="checkbox">
                            <input type="checkbox" unchecked>
                            <span>Diseño</span>
                        </label>
                        <label class="checkbox"><input type="checkbox" unchecked>
                            <span>Editorial</span>
                        </label>
                        <label class="checkbox"><input type="checkbox" unchecked><span>Packaging</span>
                        </label>
                        <label class="checkbox"><input type="checkbox" unchecked><span>Otra cosa</span>
                        </label>
                    </div>
                </div>
                <div class="mensaje">
                    <label for="mensaje">
                        <p>Tu consulta</p>
                    </label>
                    <textarea name="mensaje" id="mensaje" maxlength="700" required></textarea>
                </div>
                <input type="submit" class="boton-enviar" value="ENVIAR">
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-izquierdo">
            <img src="img/catedra.png" alt="catedra" width="74" height="36">
            <ul>
                <li>
                    <p>Computación III</p>
                </li>
                <li>
                    <p>Catedra Wischñevsky</p>
                </li>
            </ul>
        </div>

        <div class="contacto-mail">
            <ul>
                <li>
                    <p>Contacto</p>
                </li>
                <li>
                    <p>dogamarialuz@gmail.com</p>
                </li>
            </ul>
        </div>

        <div class="redes-sociales">
            <img src="img/svg/facebook.svg" alt="facebook" width="25" height="25">
            <a href="#"></a>

            <img src="img/svg/begance.svg.svg" alt="begance" width="50" height="24">
            <a href="#"></a>

            <img src="img/svg/instagram.svg" alt="instagram" width="25" height="25">
            <a href="#"></a>
        </div>

    </footer>

</body>
